---
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  seerr:
    <<: *default-logging
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr-debridav
    init: true
    restart: unless-stopped
    environment:
      # - LOG_LEVEL=debug
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - ./seerr-config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
